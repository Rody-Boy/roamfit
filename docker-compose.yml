services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: roamfit
      POSTGRES_USER: roamfit
      POSTGRES_PASSWORD: roamfit
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  opensearch:
    image: opensearchproject/opensearch:2
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: RoamFitDev123!
    ports: ["9200:9200"]
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    depends_on: [postgres, redis, opensearch]
    ports: ["3000:3000"]
volumes:
  postgres_data:
